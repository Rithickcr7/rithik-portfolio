<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rithik.E — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0D1A0F;
  --green:#3BFF7E;
  --amber:#FFB830;
  --white:#EDF5EE;
  --muted:#6B8C70;
}

body{
  margin:0;
  font-family:'Archivo',sans-serif;
  background:var(--bg);
  color:var(--white);
  overflow-x:hidden;
}

/* PARTICLE BG */
#bg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:0;
}
body>*:not(#bg){
  position:relative;
  z-index:1;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  backdrop-filter:blur(10px);
}

/* HERO */
.hero{
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:100vh;
  padding:0 10%;
  flex-wrap:wrap;
}

.hero-text{
  flex:1;
}

.typewriter{
  font-family:'JetBrains Mono';
  color:var(--green);
  border-right:2px solid var(--green);
  padding-right:5px;
}

h1{
  font-size:60px;
  margin:10px 0;
}

p{
  color:var(--muted);
}

/* PROFILE */
.profile{
  flex:1;
  display:flex;
  justify-content:center;
}

.profile img{
  width:220px;
  height:220px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid var(--green);
  box-shadow:0 0 40px var(--green);
  animation:float 6s ease-in-out infinite;
}

@keyframes float{
  50%{transform:translateY(-20px)}
}

/* SECTION */
section{
  padding:100px 10%;
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.03);
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px rgba(0,255,200,0.3);
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 20px;
  border-radius:20px;
  border:1px solid var(--green);
  color:var(--green);
  text-decoration:none;
}

.btn:hover{
  background:var(--green);
  color:black;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
<div>RITHIK.E</div>
</nav>

<div class="hero">

<div class="hero-text">
<div id="type" class="typewriter"></div>
<h1>RITHIK.E</h1>
<p>Agricultural Engineer | AI | Smart Farming 🌱</p>
<a href="RITHIK_RESUME.pdf" download class="btn">Download Resume</a>
</div>

<div class="profile">
<img src="pic.jpeg">
</div>

</div>

<section>
<h2>Projects</h2>
<div class="grid">

<div class="card">
<h3>Water Stress Detection</h3>
<p>AI-based crop monitoring system</p>
</div>

<div class="card">
<h3>Smart Sprayer</h3>
<p>Automated spraying system</p>
</div>

</div>
</section>

<section>
<h2>Contact</h2>
<p>Email: rithickcr2@gmail.com</p>
</section>

<script>
// TYPEWRITER
let txt="RITHIK.E";
let i=0;
function type(){
  if(i<txt.length){
    document.getElementById("type").innerHTML+=txt[i];
    i++;
    setTimeout(type,100);
  }
}
type();

// PARTICLES
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.y+=0.4;
    if(p.y>canvas.height)p.y=0;
    ctx.fillStyle="#3BFF7E";
    ctx.fillRect(p.x,p.y,2,2);
  });
  requestAnimationFrame(animate);
}
animate();

// SCROLL
const sections=document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
  sections.forEach(sec=>{
    if(sec.getBoundingClientRect().top<window.innerHeight-100){
      sec.classList.add("show");
    }
  });
});
</script>

</body>
</html>
