<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rithik.E — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#00ffc3;
  --bg:#030507;
  --glass:rgba(255,255,255,0.05);
}

body{
  margin:0;
  font-family:Inter;
  background:radial-gradient(circle at top,#0a1118,#020304);
  color:white;
  overflow-x:hidden;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-family:'JetBrains Mono';
  letter-spacing:3px;
}

/* PARTICLES */
#bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  backdrop-filter:blur(10px);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding-left:80px;
}

.typewriter{
  font-family:'JetBrains Mono';
  color:var(--accent);
  border-right:2px solid var(--accent);
}

h1{
  font-size:80px;
  margin:0;
}

/* FLOAT PROFILE */
.profile{
  position:absolute;
  right:100px;
  top:50%;
  transform:translateY(-50%);
  animation:float 6s ease-in-out infinite;
}

.profile img{
  width:240px;
  height:240px;
  border-radius:50%;
  border:3px solid var(--accent);
  box-shadow:0 0 60px var(--accent);
}

@keyframes float{
  0%,100%{transform:translateY(-50%)}
  50%{transform:translateY(-60%)}
}

/* SECTION */
section{
  padding:120px 80px;
  opacity:0;
  transform:translateY(60px);
  transition:all 1s ease;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

/* GLASS CARD */
.card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:25px;
  transition:0.4s;
  transform-style:preserve-3d;
}

.card:hover{
  transform:scale(1.03);
  box-shadow:0 0 40px rgba(0,255,195,0.3);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

/* BUTTON */
.btn{
  padding:12px 25px;
  border-radius:25px;
  border:1px solid var(--accent);
  color:var(--accent);
  text-decoration:none;
}

.btn:hover{
  background:var(--accent);
  color:black;
}

/* DEMO */
.demo-btn{
  display:inline-block;
  margin-top:10px;
  padding:8px 15px;
  border-radius:20px;
  background:linear-gradient(45deg,#00ffc3,#00aaff);
  color:black;
  text-decoration:none;
}
</style>
</head>

<body>

<div id="loader">LOADING EXPERIENCE...</div>
<canvas id="bg"></canvas>

<nav>
<div>RITHIK.E</div>
</nav>

<!-- HERO -->
<div class="hero">
<div id="type" class="typewriter"></div>
<h1>RITHIK.E</h1>
<p>Engineering the future of agriculture with AI & smart systems 🌱</p>
</div>

<div class="profile">
<img src="pic.jpeg">
</div>

<!-- PROJECTS -->
<section>
<h2>Projects</h2>

<div class="grid">

<div class="card tilt">
<h3>Water Stress Detection</h3>
<p>Multi-sensor AI-based crop stress system</p>
<a href="https://water-stress-app-dxsqddmk4xuauxuucwnrdx.streamlit.app/" target="_blank" class="demo-btn">Live Demo</a>
</div>

<div class="card tilt">
<h3>Smart Sprayer</h3>
<p>SoC powered automated spraying system</p>
</div>

</div>
</section>

<!-- CONTACT -->
<section>
<h2>Contact</h2>
<a href="RITHIK_RESUME.pdf" download class="btn">Download Resume</a>
</section>

<script>
// LOADER
setTimeout(()=>{loader.style.display="none"},1500);

// TYPEWRITER
let t="RITHIK.E";
let i=0;
function type(){
 if(i<t.length){
  typeText.innerHTML+=t[i];
  i++; setTimeout(type,100);
 }
}
type();

// PARTICLES
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let p=[];
for(let i=0;i<80;i++){
 p.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);
 p.forEach(a=>{
  a.y+=0.5;
  if(a.y>c.height) a.y=0;
  ctx.fillStyle="#00ffc3";
  ctx.fillRect(a.x,a.y,2,2);
 });
 requestAnimationFrame(draw);
}
draw();

// SCROLL REVEAL
const sections=document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
 sections.forEach(sec=>{
  const top=sec.getBoundingClientRect().top;
  if(top<window.innerHeight-100){
    sec.classList.add("show");
  }
 });
});

// TILT
document.querySelectorAll(".tilt").forEach(card=>{
 card.addEventListener("mousemove",e=>{
  let r=card.getBoundingClientRect();
  let x=e.clientX-r.left;
  let y=e.clientY-r.top;
  let rx=(y/r.height-0.5)*10;
  let ry=(x/r.width-0.5)*-10;
  card.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`;
 });
 card.addEventListener("mouseleave",()=>card.style.transform="rotate(0)");
});
</script>

</body>
</html>
